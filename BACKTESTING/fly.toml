# fly.toml app configuration file generated for backtesterjptrading on 2026-07-13T12:47:08-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backtesterjptrading'
primary_region = 'dfw'

[build]
[env]
  BACKTESTING_DATA_DIR = '/data'

[[mounts]]
  source = 'backtesting_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/login'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
